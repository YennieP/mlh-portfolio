<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <link lang='sass' rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel='icon' href="{{ url_for('static', filename='img/favicon.ico') }}" type='image/x-icon' />
    <title>Yanxi Pan — Hobbies</title>
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/">
                <div class="nav-logo">
                    <img src="{{ url_for('static', filename='img/logo.svg') }}" />
                </div>
            </a>
        </div>
    </header>

    <!-- Profile -->
    <div class="profile">
        <div class="profile-picture">
            <img src="{{ url_for('static', filename='img/Yanxi_profile.jpg') }}" alt="Yanxi Pan">
        </div>
        <h1>Yanxi Pan</h1>
    </div>

    <!-- Menu bar — dynamically generated from the pages passed by the route -->
    <nav class="menu-bar yanxi-menu">
        {% for page in pages %}
        <a href="{{ page.url }}" class="{% if page.url == request.path %}active{% endif %}">{{ page.name }}</a>
        {% endfor %}
    </nav>

    <!-- Hobbies -->
    <section class="hobbies" id="hobbies">
        <h2>Hobbies</h2>
        {% for hobby in hobbies %}
        <div class="hobby yanxi-hobby">
            <div class="hobby-text">
                <h3>{{ hobby.name }}</h3>
                {% if hobby.description %}
                <p>{{ hobby.description }}</p>
                {% endif %}
            </div>
            {% if hobby.image %}
            <div class="hobby-icon-wrap">
                <img class="hobby-photo" src="{{ url_for('static', filename=hobby.image) }}" alt="{{ hobby.name }}">
            </div>
            {% endif %}
        </div>
        {% endfor %}
    </section>
</body>

</html>
