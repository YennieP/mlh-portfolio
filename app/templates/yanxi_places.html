<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Personal Portfolio">
    <meta property="og:description" content="My Personal Portfolio">
    <meta property="og:url" content="{{ url }}">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <!-- Leaflet (interactive map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link lang='sass' rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <link rel='icon' href="{{ url_for('static', filename='img/favicon.ico') }}" type='image/x-icon' />
    <title>Yanxi Pan — Places I've Visited</title>
</head>

<body>
    <header class="nav-bar">
        <div class="nav-content">
            <a href="/">
                <div class="nav-logo">
                    <img src="{{ url_for('static', filename='img/logo.svg') }}" />
                </div>
            </a>
        </div>
    </header>

    <!-- Profile -->
    <div class="profile">
        <div class="profile-picture">
            <img src="{{ url_for('static', filename='img/Yanxi_profile.jpg') }}" alt="Yanxi Pan">
        </div>
        <h1>Yanxi Pan</h1>
    </div>

    <!-- Menu bar — dynamically generated from the pages passed by the route -->
    <nav class="menu-bar yanxi-menu">
        {% for page in pages %}
        <a href="{{ page.url }}" class="{% if page.url == request.path %}active{% endif %}">{{ page.name }}</a>
        {% endfor %}
    </nav>

    <!-- Map of places I've visited -->
    <section class="map">
        <h2>Places I've Visited</h2>
        <div id="visited-map" class="visited-map"></div>
    </section>

    <!-- Leaflet JS + map setup (markers are data-driven from the route's `visited` list) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const visited = {{ visited | tojson }};
        const map = L.map('visited-map').setView([30, 30], 1);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18,
        }).addTo(map);
        visited.forEach(function (place) {
            L.marker([place.lat, place.lng]).addTo(map).bindPopup(place.name);
        });
    </script>

    {% include '_yanxi_chatbot.html' %}
</body>

</html>
