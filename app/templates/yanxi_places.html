<!DOCTYPE HTML>
<!-- Design: Forty by HTML5 UP (html5up.net) — CC-BY 3.0. Adapted into Flask/Jinja. -->
<html>

<head>
    <title>Yanxi Pan — Places I've Visited</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Leaflet (interactive map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="{{ url_for('static', filename='forty/css/main.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/yanxi-forty.css') }}" />
    <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon" />
    <noscript>
        <link rel="stylesheet" href="{{ url_for('static', filename='forty/css/noscript.css') }}" />
    </noscript>
</head>

<body class="is-preload">
    <div id="wrapper">

        {% include '_yanxi_header.html' %}

        <!-- Banner (compact sub-page header) -->
        <section id="banner" class="major sub">
            <div class="inner">
                <header class="major">
                    <h1>Places I've Visited</h1>
                </header>
                <div class="content">
                    <p>Markers for the countries I've explored so far — click one to see where.</p>
                </div>
            </div>
        </section>

        <!-- Main -->
        <div id="main">
            <section id="map">
                <div class="inner">
                    <div id="visited-map" class="visited-map"></div>
                </div>
            </section>
        </div>

        {% include '_yanxi_footer.html' %}

    </div>

    <!-- Leaflet JS + map setup (markers are data-driven from the route's `visited` list) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const visited = {{ visited | tojson }};
        const map = L.map('visited-map').setView([30, 30], 1);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18,
        }).addTo(map);
        visited.forEach(function (place) {
            L.marker([place.lat, place.lng]).addTo(map).bindPopup(place.name);
        });
    </script>

    {% include '_yanxi_scripts.html' %}

</body>

</html>
